name: Auto Preprocessing

on: 
  push:
    paths:
      - 'winequality_raw/**'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn

      - name: Run preprocessing script
        run: |
           python preprocessing/automate_Najwa-Kurnia.py

      - name: Commit & Push Hasil Preprocessing
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add preprocessing/winequality_preprocessing/
          git commit -m "Auto: update preprocessing result" || echo "No changes"
          git push